<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Tek Teker Eğim İzleyici</title>
  <link rel="manifest" href="./manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: linear-gradient(135deg, #020617, #111827);
      --panel: rgba(15, 23, 42, 0.85);
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.18);
      --button: #38bdf8;
      --button-text: #020617;
      --secondary: rgba(148, 163, 184, 0.16);
      --card: rgba(15, 23, 42, 0.72);
    }
    body.light-theme {
      color-scheme: light;
      --bg: linear-gradient(135deg, #f8fafc, #e2e8f0);
      --panel: rgba(255, 255, 255, 0.9);
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(15, 23, 42, 0.08);
      --button: #0f172a;
      --button-text: #fff;
      --secondary: #e2e8f0;
      --card: #fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      transition: background 0.25s ease, color 0.25s ease;
    }
    .app {
      width: min(100%, 520px);
      background: var(--panel);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(2, 6, 23, 0.28);
      padding: 20px;
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
    }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    p { margin: 0 0 16px; color: var(--muted); font-size: 0.95rem; }
    .controls, .action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    button, .pill { border: 0; border-radius: 999px; padding: 10px 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    button { background: var(--button); color: var(--button-text); }
    button.secondary { background: var(--secondary); color: var(--text); }
    .card { border-radius: 20px; padding: 16px; background: var(--card); margin-top: 12px; box-shadow: inset 0 1px 2px rgba(15,23,42,0.05); }
    .gauge { min-height: 220px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: background 0.25s ease, color 0.25s ease; color: var(--text); border: 1px solid var(--border); }
    .gauge .value { font-size: 3.2rem; font-weight: 800; line-height: 1; }
    .gauge .label { margin-top: 8px; font-size: 0.95rem; opacity: 0.9; }
    .metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 10px; }
    .metric { padding: 10px; border-radius: 14px; background: var(--secondary); }
    .metric strong { display: block; font-size: 1.05rem; margin-top: 2px; }
    .status-row { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.95rem; gap: 8px; flex-wrap: wrap; }
    .switch-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
    .switch { display: flex; align-items: center; gap: 8px; font-size: 0.92rem; color: var(--muted); }
    .switch input { accent-color: var(--button); }
    .support-hint { margin-bottom: 8px; color: var(--muted); font-size: 0.86rem; }
    .history { margin-top: 10px; max-height: 220px; overflow: auto; }
    .hidden { display: none; }
    .history-item { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: 8px; font-size: 0.9rem; }
    .muted { color: var(--muted); font-size: 0.85rem; }
    canvas { width: 100% !important; height: 220px !important; }
    @media (max-width: 480px) { body { padding: 8px; } .app { padding: 16px; } .gauge { min-height: 190px; } .metrics { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="app">
    <h1>Tek Teker Eğim İzleyici</h1>
    <p>Yeni başlayanlar için eğimi rahatça takip edin. 30° civarında uyarı verilir.</p>
    <div class="switch-row">
      <label class="switch"><input type="checkbox" id="wakeToggle" checked /> Ekranı açık tut</label>
      <label class="switch"><input type="checkbox" id="soundToggle" checked /> Sesli uyarı</label>
      <label class="switch"><input type="checkbox" id="themeToggle" /> Karanlık tema</label>
    </div>
    <div class="controls">
      <button id="startBtn">İzin ver ve başlat</button>
      <button id="installBtn" class="secondary">Telefona kur</button>
      <button id="fullscreenBtn" class="secondary">Tam ekran</button>
    </div>
    <div class="support-hint" id="supportHint">iPhone'da sensör izni verildiğinde özellikler çalışır.</div>
    <section class="card">
      <div class="gauge" id="gauge">
        <div class="value" id="angleValue">0°</div>
        <div class="label" id="angleLabel">Hazır</div>
      </div>
      <div class="metrics">
        <div class="metric">En yüksek açı<strong id="maxAngleValue">0°</strong></div>
        <div class="metric">Süre<strong id="timerValue">00:00</strong></div>
        <div class="metric">GPS hızı<strong id="speedValue">—</strong></div>
        <div class="metric">Durum<strong id="statusValue">Bekleniyor</strong></div>
      </div>
      <div class="status-row">
        <span>Durum: <strong id="statusText">Bekleniyor</strong></span>
        <span>Uyarı: <strong id="warningText">Hazır</strong></span>
      </div>
    </section>
    <section class="card">
      <div class="muted">Eğilim grafiği</div>
      <canvas id="historyChart"></canvas>
    </section>
    <section class="card">
      <div class="action-row">
        <button id="toggleHistoryBtn" class="secondary">Geçmişi göster</button>
        <button id="clearBtn" class="secondary">Temizle</button>
      </div>
      <div class="muted">Son ölçümler</div>
      <div id="historyPanel" class="history hidden"></div>
    </section>
  </main>
  <script>
    const startBtn = document.getElementById("startBtn");
    const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");
    const clearBtn = document.getElementById("clearBtn");
    const wakeToggle = document.getElementById("wakeToggle");
    const soundToggle = document.getElementById("soundToggle");
    const themeToggle = document.getElementById("themeToggle");
    const installBtn = document.getElementById("installBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const gauge = document.getElementById("gauge");
    const angleValue = document.getElementById("angleValue");
    const angleLabel = document.getElementById("angleLabel");
    const statusText = document.getElementById("statusText");
    const warningText = document.getElementById("warningText");
    const historyPanel = document.getElementById("historyPanel");
    const supportHint = document.getElementById("supportHint");
    const maxAngleValue = document.getElementById("maxAngleValue");
    const timerValue = document.getElementById("timerValue");
    const speedValue = document.getElementById("speedValue");
    const statusValue = document.getElementById("statusValue");
    const storageKey = "tek-teker-egim-logs-v1";
    const themeKey = "tek-teker-theme";
    let permissionGranted = false;
    let wakeLockSentinel = null;
    let latestAngle = 0;
    let maxAngle = 0;
    let lastAlertAt = 0;
    let lastLogAt = 0;
    let logs = [];
    let samples = [];
    let sessionStartedAt = null;
    let timerInterval = null;
    let chartInstance = null;
    let installPrompt = null;
    let gpsWatchId = null;
    let speechReady = false;

    function loadLogs() {
      try {
        const raw = localStorage.getItem(storageKey);
        logs = raw ? JSON.parse(raw) : [];
      } catch (err) {
        logs = [];
      }
      renderLogs();
    }

    function saveLogs() {
      localStorage.setItem(storageKey, JSON.stringify(logs.slice(-20)));
      renderLogs();
    }

    function addLog(angle) {
      const now = new Date();
      logs.push({
        time: now.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
        angle: Math.round(angle),
        state: classifyAngle(angle)
      });
      if (logs.length > 20) logs.shift();
      saveLogs();
    }

    function classifyAngle(angle) {
      if (angle < 10) return "Çok sakin";
      if (angle < 20) return "Düşük";
      if (angle < 30) return "Orta";
      if (angle < 45) return "Yüksek";
      return "Tehlikeli";
    }

    function renderLogs() {
      if (!logs.length) {
        historyPanel.innerHTML = '<div class="muted">Henüz ölçüm yok.</div>';
        return;
      }
      historyPanel.innerHTML = logs.slice().reverse().map(function(item) {
        return '<div class="history-item"><span>' + item.time + '</span><span>' + item.angle + '° · ' + item.state + '</span></div>';
      }).join("");
    }

    function interpolateColor(start, end, t) {
      const mix = function(a, b, p) { return Math.round(a + (b - a) * p); };
      return start.map(function(value, index) { return mix(value, end[index], t); });
    }

    function colorForAngle(angle) {
      const clamped = Math.max(0, Math.min(angle, 90));
      const ratio = clamped / 90;
      const white = [255, 255, 255];
      const green = [150, 230, 160];
      const yellow = [245, 215, 90];
      const red = [255, 90, 90];
      if (ratio < 0.35) return interpolateColor(white, green, ratio / 0.35);
      if (ratio < 0.70) return interpolateColor(green, yellow, (ratio - 0.35) / 0.35);
      return interpolateColor(yellow, red, (ratio - 0.70) / 0.30);
    }

    function updateDisplay(angle) {
      const safeAngle = Math.max(0, Math.min(90, Math.round(angle)));
      latestAngle = safeAngle;
      if (safeAngle > maxAngle) maxAngle = safeAngle;
      const rgba = colorForAngle(safeAngle);
      gauge.style.background = "linear-gradient(135deg, rgba(" + rgba[0] + ", " + rgba[1] + ", " + rgba[2] + ", 0.95), rgba(255,255,255,0.8))";
      gauge.style.color = safeAngle > 45 ? "#fff" : "#0f172a";
      angleValue.textContent = safeAngle + "°";
      angleLabel.textContent = safeAngle >= 30 ? "Yüksek eğim" : "İzleniyor";
      statusText.textContent = classifyAngle(safeAngle);
      warningText.textContent = safeAngle >= 30 ? "Uyarı" : "Normal";
      maxAngleValue.textContent = maxAngle + "°";
      statusValue.textContent = classifyAngle(safeAngle);

      if (safeAngle >= 30 && soundToggle.checked && Date.now() - lastAlertAt > 2200) {
        beep();
        speakWarning(safeAngle);
        if ("vibrate" in navigator) navigator.vibrate([140, 60, 140]);
        lastAlertAt = Date.now();
      }

      if (Date.now() - lastLogAt > 1000) {
        addLog(safeAngle);
        addSample(safeAngle);
        lastLogAt = Date.now();
      }
    }

    function beep() {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        const ctx = new Ctx();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.25);
        ctx.resume().catch(function() {});
        ctx.close();
      } catch (err) {}
    }

    function speakWarning(angle) {
      if (!("speechSynthesis" in window) || !soundToggle.checked) return;
      if (!speechReady) {
        speechReady = true;
        window.speechSynthesis.cancel();
      }
      const utterance = new SpeechSynthesisUtterance("Dikkat, eğim " + angle + " derece");
      utterance.lang = "tr-TR";
      utterance.rate = 1.05;
      window.speechSynthesis.speak(utterance);
    }

    async function requestWakeLock() {
      if (!("wakeLock" in navigator) || !wakeToggle.checked) return;
      try {
        wakeLockSentinel = await navigator.wakeLock.request("screen");
      } catch (err) {}
    }

    async function releaseWakeLock() {
      if (wakeLockSentinel) {
        try {
          await wakeLockSentinel.release();
        } catch (err) {}
        wakeLockSentinel = null;
      }
    }

    function startTimer() {
      if (timerInterval) return;
      sessionStartedAt = Date.now();
      timerInterval = setInterval(function() {
        const elapsed = Math.floor((Date.now() - sessionStartedAt) / 1000);
        const minutes = String(Math.floor(elapsed / 60)).padStart(2, "0");
        const seconds = String(elapsed % 60).padStart(2, "0");
        timerValue.textContent = minutes + ":" + seconds;
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function initChart() {
      const canvas = document.getElementById("historyChart");
      if (!canvas) return;
      if (typeof Chart === "undefined") {
        canvas.outerHTML = '<div class="muted">Grafik yüklenemedi. İnternet bağlantısını kontrol edin.</div>';
        return;
      }
      const ctx = canvas.getContext("2d");
      chartInstance = new Chart(ctx, {
        type: "line",
        data: {
          labels: [],
          datasets: [{
            label: "Açı",
            data: [],
            borderColor: "#38bdf8",
            backgroundColor: "rgba(56, 189, 248, 0.16)",
            tension: 0.3,
            fill: true,
            pointRadius: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, max: 90, ticks: { color: "#94a3b8" } },
            x: { ticks: { color: "#94a3b8" } }
          }
        }
      });
    }

    function addSample(angle) {
      const now = new Date();
      samples.push({ time: now.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }), angle: Math.round(angle) });
      if (samples.length > 20) samples.shift();
      if (chartInstance) {
        chartInstance.data.labels = samples.map(function(item) { return item.time; });
        chartInstance.data.datasets[0].data = samples.map(function(item) { return item.angle; });
        chartInstance.update();
      }
    }

    function applyTheme(forceDark) {
      const enabled = forceDark ?? localStorage.getItem(themeKey) !== "light";
      document.body.classList.toggle("light-theme", !enabled);
      themeToggle.checked = enabled;
      document.documentElement.style.setProperty("--theme-color", enabled ? "#0f172a" : "#f8fafc");
      localStorage.setItem(themeKey, enabled ? "dark" : "light");
    }

    function updateSupportHint(message) {
      if (supportHint) supportHint.textContent = message;
    }

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    async function requestSensorPermissions() {
      if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
          const result = await DeviceOrientationEvent.requestPermission();
          if (result !== "granted") {
            updateSupportHint("iPhone'da sensör izni verilmeden ölçüm başlatılamaz.");
            angleLabel.textContent = "İzin reddedildi";
            return false;
          }
        } catch (err) {
          updateSupportHint("Sensör izni alınamadı. Lütfen tekrar deneyin.");
          angleLabel.textContent = "İzin alınamadı";
          return false;
        }
      }
      if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
        try {
          const result = await DeviceMotionEvent.requestPermission();
          if (result !== "granted") {
            updateSupportHint("iPhone'da hareket izni verilmeden ölçüm başlatılamaz.");
            angleLabel.textContent = "İzin reddedildi";
            return false;
          }
        } catch (err) {
          updateSupportHint("Hareket izni alınamadı. Lütfen tekrar deneyin.");
          angleLabel.textContent = "İzin alınamadı";
          return false;
        }
      }
      return true;
    }

    function startGps() {
      if (!navigator.geolocation) {
        speedValue.textContent = "GPS yok";
        return;
      }
      if (gpsWatchId !== null) return;
      gpsWatchId = navigator.geolocation.watchPosition(function(position) {
        const speedKmh = position.coords.speed !== null ? (position.coords.speed * 3.6).toFixed(1) : "0.0";
        speedValue.textContent = speedKmh + " km/h";
      }, function() {
        speedValue.textContent = "İzin reddedildi";
      }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 8000 });
    }

    function stopGps() {
      if (gpsWatchId !== null) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
      }
    }

    async function startSensors() {
      if (permissionGranted) return;
      const permissionOk = await requestSensorPermissions();
      if (!permissionOk) return;
      permissionGranted = true;
      startBtn.textContent = "Ölçüm çalışıyor";
      startBtn.disabled = true;
      angleLabel.textContent = "Sensörler aktif";
      updateSupportHint(isIOS() ? "iPhone'da sensörler aktif. İsterseniz tam ekran ve ana ekrana ekleme de kullanılabilir." : "Tüm özellikler aktif. İzinler verildiğinde ölçüm devam eder.");
      window.addEventListener("deviceorientation", handleOrientation, { passive: true });
      window.addEventListener("devicemotion", handleMotion, { passive: true });
      startTimer();
      startGps();
      await requestWakeLock();
      updateDisplay(latestAngle);
    }

    function handleOrientation(event) {
      if (event.beta !== null && Number.isFinite(event.beta)) latestAngle = Math.abs(event.beta);
    }

    function handleMotion(event) {
      if (!event.accelerationIncludingGravity) return;
      const ax = event.accelerationIncludingGravity.x || 0;
      const ay = event.accelerationIncludingGravity.y || 0;
      const az = event.accelerationIncludingGravity.z || 0;
      const angle = Math.abs(Math.atan2(ay, Math.sqrt(ax * ax + az * az)) * 180 / Math.PI);
      if (Number.isFinite(angle)) latestAngle = Math.max(0, Math.min(90, angle));
    }

    function toggleFullscreen() {
      const el = document.documentElement;
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (el.requestFullscreen) {
          el.requestFullscreen().catch(function() {});
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen().catch(function() {});
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    }

    window.addEventListener("beforeinstallprompt", function(event) {
      event.preventDefault();
      installPrompt = event;
      installBtn.style.display = "inline-flex";
    });

    installBtn.addEventListener("click", async function() {
      if (installPrompt) {
        installPrompt.prompt();
        await installPrompt.userChoice;
        installPrompt = null;
        return;
      }
      if (isIOS()) {
        updateSupportHint("iPhone'da: Paylaş butonuna dokunup 'Ana Ekrana Ekle' seçin.");
      } else {
        updateSupportHint("Bu tarayıcıda kurulum butonu desteklenmiyor. Tarayıcıdaki kurulum seçeneğini kullanın.");
      }
    });

    startBtn.addEventListener("click", function() { startSensors(); });
    toggleHistoryBtn.addEventListener("click", function() {
      historyPanel.classList.toggle("hidden");
      toggleHistoryBtn.textContent = historyPanel.classList.contains("hidden") ? "Geçmişi göster" : "Geçmişi gizle";
    });
    clearBtn.addEventListener("click", function() {
      logs = [];
      samples = [];
      maxAngle = 0;
      maxAngleValue.textContent = "0°";
      localStorage.removeItem(storageKey);
      if (chartInstance) {
        chartInstance.data.labels = [];
        chartInstance.data.datasets[0].data = [];
        chartInstance.update();
      }
      renderLogs();
    });
    wakeToggle.addEventListener("change", function() {
      if (wakeToggle.checked) requestWakeLock(); else releaseWakeLock();
    });
    themeToggle.addEventListener("change", function() {
      applyTheme(themeToggle.checked);
    });
    fullscreenBtn.addEventListener("click", toggleFullscreen);
    document.addEventListener("visibilitychange", function() {
      if (document.visibilityState === "visible") requestWakeLock(); else releaseWakeLock();
    });
    setInterval(function() {
      if (permissionGranted) updateDisplay(latestAngle);
    }, 250);

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(registration) {
          registration.unregister();
        });
      }).catch(function() {});
      navigator.serviceWorker.register("./sw.js?v=" + Date.now()).catch(function() {});
    }

    initChart();
    applyTheme();
    loadLogs();
    renderLogs();
  </script>
</body>
</html>
